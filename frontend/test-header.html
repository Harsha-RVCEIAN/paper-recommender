<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Test Header</title>
  <style>
    :root{--muted:#6b7280;--accent2:#8b5cf6}
    .topbar{display:flex;justify-content:space-between;align-items:center;padding:20px 28px;background:rgba(255,255,255,0.6);border-bottom-left-radius:12px;border-bottom-right-radius:12px;box-shadow:0 6px 18px rgba(12,18,35,0.06);}
    .brand{font-weight:700;color:#6c63ff;font-size:20px;display:flex;gap:8px;align-items:center;}
    .nav{display:flex;gap:18px}
    .navlink{color:var(--muted);padding:8px 12px;border-radius:8px;text-decoration:none}
    .navlink:hover{background:rgba(107,114,128,0.06);color:var(--accent2)}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">🔎 <span>ScholarSearch</span></div>

    <nav class="nav">
      <a class="navlink" href="index.html">Search</a>
      <a class="navlink" href="results.html">Results</a>
      <a class="navlink" href="analytics.html">Analytics</a>
    </nav>
  </header>
</body>
</html>
