<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ScholarSearch — Results</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">🔎 <span>ScholarSearch</span></div>

    <nav class="nav" id="main-nav">
      <a class="navlink" href="index.html">Search</a>
      <a class="navlink" href="results.html">Results</a>
      <a class="navlink" href="analytics.html">Analytics</a>
    </nav>
  </header>

  <main class="hero" style="text-align:left; max-width:1000px; margin:28px auto;">
    <h2 id="results-title">Search results</h2>
    <p id="results-sub" class="small" style="margin-bottom:12px;"></p>

    <div id="results" class="results"></div>
  </main>

  <script>
    (function() {
      try {
        const path = (window.location.pathname || '').split('/').pop() || 'results.html';
        document.querySelectorAll('#main-nav .navlink').forEach(a=>{
          const href = a.getAttribute('href') || '';
          if(href === path) a.classList.add('active'); else a.classList.remove('active');
        });
      } catch(e){}
    })();
  </script>

  <script src="results.js"></script>
  <script src="app.js"></script>
</body>
</html>
