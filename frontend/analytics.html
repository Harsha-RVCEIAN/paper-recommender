<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ScholarSearch — Analytics</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">🔎 <span>ScholarSearch</span></div>

    <nav class="nav" id="main-nav">
      <a class="navlink" href="index.html">Search</a>
      <a class="navlink" href="results.html">Results</a>
      <a class="navlink" href="analytics.html">Analytics</a>
    </nav>
  </header>

  <main class="hero" style="text-align:left; max-width:1000px; margin:28px auto;">
    <h1>Research Analytics</h1>
    <p class="subtitle">Overview of papers, citations, and keywords</p>

    <section class="overview-grid" style="margin-bottom:20px;">
      <div class="card">
        <h3>Overview</h3>
        <div style="padding-top:12px;">
          <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f1f5f9;">
            <div>Total Papers</div><div id="stat-total-papers" class="small">—</div>
          </div>
          <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f1f5f9;">
            <div>Unique Keywords</div><div id="stat-unique-keywords" class="small">—</div>
          </div>
          <div style="display:flex;justify-content:space-between;padding:10px 0;">
            <div>Total References</div><div id="stat-total-references" class="small">—</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h3>Top Cited Papers</h3>
        <div id="top-cited-list" style="margin-top:14px;"></div>
      </div>

      <div class="card">
        <h3>Popular Keywords</h3>
        <div id="popular-keywords-list" style="margin-top:14px;"></div>
      </div>
    </section>

    <section style="margin-top:8px;">
      <div class="card" id="extra-analytics">
        <h3>Extra</h3>
        <p class="small">More analytics coming — e.g., citation distribution, timeline, co-occurrence graphs.</p>
      </div>
    </section>
  </main>

  <script>
    (function() {
      try {
        const path = (window.location.pathname || '').split('/').pop() || 'analytics.html';
        document.querySelectorAll('#main-nav .navlink').forEach(a=>{
          const href = a.getAttribute('href') || '';
          if(href === path) a.classList.add('active'); else a.classList.remove('active');
        });
      } catch(e){}
    })();
  </script>

  <script src="analytics.js"></script>
  <script src="app.js"></script>
</body>
</html>
